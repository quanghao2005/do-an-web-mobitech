spring.application.name=backend
server.port=8080
# Cấu hình MySQL - Thêm timezone để tránh lỗi kết nối
spring.datasource.url=jdbc:mysql://localhost:3306/phone_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# Driver cụ thể cho bản MySQL mới
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Giúp Hibernate nhận diện đúng loại database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# 1. Cấu hình Multipart (Dành cho upload file trực tiếp)
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB
# 2. Cấu hình cho Tomcat (Cực kỳ quan trọng để nhận chuỗi Base64 dài)
# Mặc định Tomcat chỉ nhận 2MB cho các tham số POST. 
# Cần set lên -1 (không giới hạn) hoặc một con số cực lớn.
server.tomcat.max-http-form-post-size=200000000
server.tomcat.max-http-parameter-value-size=200000000
server.tomcat.max-swallow-size=200MB
# 3. Tăng kích thước bộ đệm Header nếu cần
server.max-http-header-size=1MB
# 4. Cấu hình gửi Mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hao01679462492@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# 5. Cau hinh Google Gemini API
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
